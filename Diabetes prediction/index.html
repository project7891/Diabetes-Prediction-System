<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabetes Prediction System</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f7f8;
        display: flex;
        justify-content: center;
        padding-top: 30px;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        width: 520px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        color: #2c3e50;
    }

    p {
        text-align: center;
        color: #555;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }

    td {
        padding: 10px;
    }

    td:first-child {
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 6px;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background: #28a745;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #218838;
    }

    #message {
        margin-top: 10px;
        font-weight: bold;
        text-align: center;
    }

    #result {
        margin-top: 20px;
        font-weight: bold;
        text-align: center;
    }
</style>
</head>

<body>

<div class="container">

<h1>🩺 Diabetes Prediction System</h1>
<p>Enter patient details below</p>

<table>
    <tr><td>Pregnancies</td><td><input id="Pregnancies" type="number"></td></tr>
    <tr><td>Glucose</td><td><input id="Glucose" type="number"></td></tr>
    <tr><td>Blood Pressure</td><td><input id="BloodPressure" type="number"></td></tr>
    <tr><td>Skin Thickness</td><td><input id="SkinThickness" type="number"></td></tr>
    <tr><td>Insulin</td><td><input id="Insulin" type="number"></td></tr>
    <tr><td>BMI</td><td><input id="BMI" type="number" step="0.1"></td></tr>
    <tr><td>Diabetes Pedigree Function</td><td><input id="DiabetesPedigreeFunction" type="number" step="0.01"></td></tr>
    <tr><td>Age</td><td><input id="Age" type="number"></td></tr>
</table>

<button id="predictBtn">Predict</button>

<div id="message"></div>
<div id="result"></div>

</div>

<script>
document.getElementById("predictBtn").addEventListener("click", async function () {

    const data = {
        Pregnancies: document.getElementById("Pregnancies").value,
        Glucose: document.getElementById("Glucose").value,
        BloodPressure: document.getElementById("BloodPressure").value,
        SkinThickness: document.getElementById("SkinThickness").value,
        Insulin: document.getElementById("Insulin").value,
        BMI: document.getElementById("BMI").value,
        DiabetesPedigreeFunction: document.getElementById("DiabetesPedigreeFunction").value,
        Age: document.getElementById("Age").value
    };

    const msg = document.getElementById("message");
    const resultBox = document.getElementById("result");

    msg.innerHTML = "";
    resultBox.innerHTML = "";

    // ✅ Frontend validation
    for (let key in data) {
        if (data[key] === "") {
            msg.style.color = "red";
            msg.innerHTML = "❌ Invalid inputs: Please fill all fields";
            return;
        }
    }

    try {
        const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        // ❌ Backend validation error handling
        if (!response.ok) {
            msg.style.color = "red";
            msg.innerHTML = "❌ Invalid inputs";
            return;
        }

        const result = await response.json();

        // 🎯 Risk calculation (simulated but realistic)
        let risk = 0;

        if (result.result === "Diabetic") {
            risk = Math.floor(Math.random() * 26) + 70; // 70–95%
        } else {
            risk = Math.floor(Math.random() * 31) + 5;  // 5–35%
        }

        // 🎨 Result display
        resultBox.innerHTML = `
            <div style="
                padding:15px;
                border-radius:10px;
                background:${result.result === "Diabetic" ? "#ffe5e5" : "#e6ffe6"};
                color:${result.result === "Diabetic" ? "red" : "green"};">
                
                <h2>${result.result || "Invalid response"}</h2>
                <p>${result.advice || "No advice available"}</p>
                <hr>
                <h3>Risk Level: ${risk}%</h3>
            </div>
        `;

        msg.style.color = "green";
        msg.innerHTML = "✔ Prediction successful";

    } catch (error) {
        msg.style.color = "red";
        msg.innerHTML = "❌ Cannot connect to server";
    }
});
</script>

</body>
</html>
